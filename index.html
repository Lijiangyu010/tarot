<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiTarot - 里塔罗</title>
  <meta name="description" content="LiTarot - 基于莱德韦特塔罗体系的三张牌阵在线占卜">
  <link rel="stylesheet" href="css/style.css">
  <!-- 预加载关键资源 -->
  <link rel="preload" href="images/card_back.webp" as="image">
  <!-- 截图库 -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
</head>
<body>
  <!-- ===== 顶部导航栏 ===== -->
  <header class="navbar">
    <div class="navbar-inner">
      <!-- Logo -->
      <a href="index.html" class="logo">
        <svg class="logo-icon" viewBox="0 0 48 48" width="40" height="40" aria-hidden="true">
          <circle cx="24" cy="24" r="10" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
          <circle cx="20" cy="22" r="8" fill="#c9a84c" opacity="0.85"/>
          <path d="M32 8l1 3 3 1-3 1-1 3-1-3-3-1 3-1z" fill="#fff" opacity="0.9"/>
          <path d="M38 16l0.7 2 2 0.7-2 0.7-0.7 2-0.7-2-2-0.7 2-0.7z" fill="#fff" opacity="0.6"/>
          <path d="M12 36l0.5 1.5 1.5 0.5-1.5 0.5-0.5 1.5-0.5-1.5-1.5-0.5 1.5-0.5z" fill="#fff" opacity="0.5"/>
        </svg>
        <span class="logo-text">里塔罗</span>
      </a>
      <!-- 右侧操作 -->
      <div class="nav-actions">
        <button class="btn-icon" id="btnScreenshot" title="截图分享" aria-label="截图分享">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== 主内容区 ===== -->
  <main class="main-wrapper" id="reading-section">
    <div class="content-area">
      <!-- 左侧/主占卜区 -->
      <section class="reading-zone">
        <!-- 标题 -->
        <h1 class="section-title">三牌阵占卜</h1>
        <p class="section-hint">专注于你的问题，然后洗牌并切牌。</p>

        <!-- 操作按钮 -->
        <div class="action-buttons">
          <button class="btn btn-shuffle" id="btnShuffle">洗 牌</button>
          <button class="btn btn-cut" id="btnCut" disabled>切 牌</button>
          <button class="btn btn-start" id="btnStart" disabled>开始占卜</button>
        </div>

        <!-- 牌堆展示区 -->
        <div class="deck-area" id="deckArea">
          <div class="deck-stack" id="deckStack">
            <!-- JS 动态生成牌堆 -->
          </div>
        </div>

        <!-- 放牌区标题 -->
        <h2 class="drawing-title">放 牌 区</h2>

        <!-- 三张牌放置区 -->
        <div class="drawing-area" id="drawingArea">
          <div class="card-slot" id="slot0">
            <div class="card-placeholder">
              <div class="placeholder-border"></div>
            </div>
            <span class="slot-label">&nbsp;</span>
          </div>
          <div class="card-slot" id="slot1">
            <div class="card-placeholder">
              <div class="placeholder-border"></div>
            </div>
            <span class="slot-label">&nbsp;</span>
          </div>
          <div class="card-slot" id="slot2">
            <div class="card-placeholder">
              <div class="placeholder-border"></div>
            </div>
            <span class="slot-label">&nbsp;</span>
          </div>
        </div>
      </section>

    </div>

    <!-- 移动端折叠面板 -->
    <div class="mobile-panel" id="mobilePanel">
      <button class="panel-toggle" id="panelToggle" aria-expanded="false">
        <span>问题 &amp; 牌义解读</span>
        <svg class="panel-arrow" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="panel-body" id="panelBody">
        <div class="panel-section">
          <h3 class="panel-label">当前问题：</h3>
          <textarea class="question-input" id="questionInputMobile" placeholder="在此输入你的问题..." rows="2" maxlength="200"></textarea>
        </div>
        <div class="panel-section">
          <h3 class="panel-label">牌义解读：</h3>
          <div class="interpretation-content" id="interpretationContentMobile">
            <p class="interpretation-placeholder">抽牌后将在此显示解读...</p>
          </div>
        </div>
      </div>
    </div>
    <!-- 重置按钮 -->
    <div class="reset-wrapper" id="resetWrapper" style="display:none">
      <button class="btn btn-reset" id="btnReset">重新占卜</button>
    </div>
  </main>

  <!-- JS -->
  <script src="js/tarot-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
